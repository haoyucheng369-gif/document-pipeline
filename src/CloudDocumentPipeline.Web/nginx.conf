server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 路由刷新时统一回退到 index.html，交给 React Router 处理。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源按真实文件返回，不额外回退。
    location /assets/ {
        try_files $uri =404;
    }
}
